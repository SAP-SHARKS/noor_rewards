flutter_launcher_icons:
  # Use the standard `ic_launcher` name. Some Android launchers, the
  # "Search apps" surface, and certain OEM (Samsung/Xiaomi) UI contexts
  # fall back to `@mipmap/ic_launcher` regardless of what the manifest
  # declares, so a custom name leaves stale Flutter-template icons
  # visible in those places.
  android: true
  ios: true
  image_path: "assets/images/app_icon_launcher.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  # Coin now fills the full foreground canvas (see tools/crop_launcher_icon.dart)
  # so the background is only visible at the very edges where the launcher
  # mask trims. Setting it to the coin's actual brass-gold rim colour means
  # those edges blend invisibly — no cream / honey ring left.
  adaptive_icon_background: "#B89241"
  adaptive_icon_foreground: "assets/images/app_icon_launcher.png"
  remove_alpha_ios: true

  # ── Notification (status-bar) icon ────────────────────────────────────────
  # Android requires a TRANSPARENT monochrome silhouette for the status-bar
  # icon (system tints it). flutter_launcher_icons auto-generates one when
  # the field below is set. Without it Android falls back to a generic dot.
  # The source PNG should be a white silhouette of the coin on transparent
  # background — place it at the path below or it'll be auto-derived.
  # adaptive_icon_monochrome: "assets/images/app_icon_monochrome.png"

