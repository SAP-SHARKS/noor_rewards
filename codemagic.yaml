# Codemagic build configuration.
#
# Signing identity is fetched at build time from the App Store Connect API
# key uploaded under Teams → Codemagic → Integrations:
#   Integration name : Codemagic
#   Issuer ID        : 7a39c4c7-9c57-4419-8071-9e486db5cef7
#   Key ID           : DMPB84UZ69
# `xcode-project use-profiles` then provisions / fetches a matching
# development profile for com.sabiq.noorrewards before flutter build ipa.

workflows:
  ios-workflow:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        # Switch to ad_hoc for UDID-restricted test builds, or development
        # for direct-install dev builds.
        distribution_type: app_store
        bundle_identifier: com.sabiq.noorrewards
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Generate .env from Codemagic environment variables
        # `.env` is gitignored (it holds Quran Foundation API secrets) but
        # pubspec.yaml declares it as a Flutter asset, so the asset bundler
        # needs a file. We write one from Codemagic env vars — set them
        # under Workflow → Environment variables (mark each "Secure").
        # If a var is unset the placeholder stays empty and the Quran
        # auth code falls back to unauthenticated mode automatically.
        script: |
          cat > "$CM_BUILD_DIR/.env" <<EOF
          IS_DEV=${IS_DEV:-false}
          QURAN_PRELIVE_CLIENT_ID=${QURAN_PRELIVE_CLIENT_ID:-}
          QURAN_PRELIVE_CLIENT_SECRET=${QURAN_PRELIVE_CLIENT_SECRET:-}
          QURAN_PROD_CLIENT_ID=${QURAN_PROD_CLIENT_ID:-}
          QURAN_PROD_CLIENT_SECRET=${QURAN_PROD_CLIENT_SECRET:-}
          EOF
      - name: Disable Swift Package Manager (use CocoaPods)
        # Firebase iOS SDK 12.x has a known SPM bug where the grpc-binary
        # artifact zip fails to download on fresh CI runners
        # ("file not found: SourcePackages/artifacts/grpc-binary/grpc/grpc.zip").
        # Forcing CocoaPods sidesteps the SPM dependency graph entirely
        # and is the path Firebase officially supports for Flutter.
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Fetch the latest Flutter packages
        script: |
          flutter pub get
      - name: Auto-bump build number from App Store Connect
        # Looks up the latest build number that exists on App Store Connect
        # (across TestFlight + App Store), adds 1, and writes it back into
        # pubspec.yaml's `version: X.Y.Z+N` field. This prevents the
        # "bundle version must be higher than the previously uploaded
        # version" 409 we hit on build #9.
        #
        # The marketing version (X.Y.Z) is preserved as-is — only N changes.
        # Bump X.Y.Z manually in pubspec.yaml when you ship a new release.
        #
        # Uses the same App Store Connect integration that's already wired
        # up for code signing, so no extra secrets are needed.
        script: |
          set -e
          BUNDLE_ID="com.sabiq.noorrewards"

          APP_ID=$(app-store-connect apps list \
            --bundle-id-identifier "$BUNDLE_ID" \
            --strict-match-identifier \
            --json | python3 -c "import sys, json; d = json.load(sys.stdin); print(d[0]['id']) if d else sys.exit('No app found for bundle $BUNDLE_ID')")

          LATEST=$(app-store-connect get-latest-build-number "$APP_ID" 2>/dev/null || echo "0")
          NEW=$((LATEST + 1))

          echo "App Store Connect latest build: $LATEST"
          echo "Bumping pubspec.yaml to build: $NEW"

          sed -i '' -E "s/^(version: [0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+/\1+$NEW/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Install CocoaPods dependencies
        # With SPM disabled, `flutter pub get` (above) auto-generates
        # ios/Podfile + ios/Flutter/Generated.xcconfig referencing every
        # plugin pod. We then run `pod install` in the ios/ folder so
        # Runner.xcworkspace links the resolved pods.
        script: |
          cd ios && pod install --repo-update
      - name: Set up provisioning profiles via the connected ASC API key
        script: |
          xcode-project use-profiles
      - name: Flutter build IPA (release)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
