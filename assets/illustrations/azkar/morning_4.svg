<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE UNBREAKABLE HANDHOLD — al-Urwatu'l-Wuthqa (al-Baqarah 2:256)

  Sequence, played ONCE and then frozen:
     0.0-2.4s   the thread of light descends from above
     1.2-3.8s   the soul's aura rises from below and its tendrils wrap the thread
     3.3-4.5s   the clasp forms — a luminous loop, the 'urwah itself
  From 4s onward, forever: pulses of warm light travel the thread in BOTH directions.

  WHY THE GRIP NEVER RELEASES: the verse says "la infisama laha". Fasm is specifically a break
  that does not separate — a crack, a fracture, a fraying. So the ayah denies even a hairline
  flaw, not merely a snap. Animating the clasp forming and releasing on a loop would contradict
  that. The connection is therefore made once and held; only the light inside it moves.

  The 'urwah is literally the LOOP of a rope — the part you grip — so the junction is rendered as
  a soft luminous ring rather than a knot or a join.

  Background is deliberately light and warm. On a cream field, light cannot read by being brighter
  than its surroundings, so every glow here is built as a DEEPER amber penumbra with a near-white
  core inside it. That is what gives the thread definition without a hard edge anywhere.

  PIPELINE COMPLIANCE
    1. FIRST gradient is #bg — the intended background, a VERTICAL linearGradient, so the
       auto-painted card background meets the artwork edge seamlessly. Decorative gradients follow.
    2. All animation is SMIL inside this file. No external JS and no external CSS of any kind.
    3. All colours are #RRGGBB hex. (Note: the SMIL freeze keyword appears as a fill-MODE value on
       animation elements and is not a colour — a colour scanner must skip animate elements.)
    4. 780x585 = exactly 4:3, preserveAspectRatio="xMidYMid meet" set explicitly.

  #illustration : beam, aura, tendrils, thread, clasp, pulses, motes.
  #text         : the single two-line title — removable / translatable.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 780 585" width="780" height="585"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="A thread of golden light descending from above, grasped by a luminous aura rising from below">
  <defs>
    <!-- ===== BACKGROUND GRADIENT — MUST STAY FIRST ===== -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF5E6"/>
      <stop offset="1" stop-color="#DCC7A0"/>
    </linearGradient>

    <!-- ===== decorative gradients ===== -->
    <linearGradient id="beamG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4DFAA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F4DFAA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="auraG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFF8E4" stop-opacity="0.95"/>
      <stop offset="0.38" stop-color="#F6DFA0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E0B45C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraCore" cx="50%" cy="46%" r="52%">
      <stop offset="0" stop-color="#FFFDF4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F6DFA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulseG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.34" stop-color="#FFF3C4" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E9C36A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFDF4" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E9C36A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washG" cx="50%" cy="48%" r="58%">
      <stop offset="0" stop-color="#FBEFCE" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#FBEFCE" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== filters ===== -->
    <filter id="fGlow"    x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="fSoft"    x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="fTendril" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fThread"  x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fPulse"   x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="fText"    x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>

    <!-- the thread, referenced by the travelling pulses -->
    <path id="threadPath" fill="none" d="M390,-12 C381,86 399,182 390,266 C385,312 393,364 390,430"/>
  </defs>

  <rect width="780" height="585" fill="url(#bg)"/>

  <g id="illustration">
    <!-- warm wash for depth -->
    <ellipse cx="390" cy="300" rx="440" ry="330" fill="url(#washG)"/>

    <!-- soft shaft from above -->
    <path d="M336,-10 L444,-10 L472,430 L308,430 Z" fill="url(#beamG)" filter="url(#fGlow)"/>

    <!-- ============ the soul's aura, rising ============ -->
    <g opacity="0">
      <animate attributeName="opacity" begin="1.2s" dur="2.6s" values="0;1" keyTimes="0;1" fill="freeze"/>
      <g transform="translate(390,452)">
        <g>
          <animateTransform attributeName="transform" type="translate" begin="1.2s" dur="2.6s"
            values="0 54;0 0" keyTimes="0;1" fill="freeze" calcMode="spline" keySplines=".25 .1 .25 1"/>
          <g>
            <animateTransform attributeName="transform" type="scale" begin="3.8s" dur="9s" repeatCount="indefinite"
              values="1;1.04;1" keyTimes="0;0.5;1" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
            <ellipse rx="196" ry="150" fill="url(#auraG)" filter="url(#fGlow)"/>
            <ellipse rx="104" ry="86" fill="url(#auraCore)" filter="url(#fSoft)"/>
          </g>
        </g>
      </g>
    </g>

    <!-- ============ tendril passing BEHIND the thread ============ -->
    <g stroke-dasharray="100" stroke-dashoffset="100" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" begin="1.6s" dur="2.2s" values="100;0" keyTimes="0;1"
               fill="freeze" calcMode="spline" keySplines=".25 .1 .25 1"/>
      <path pathLength="100" d="M330,464 C340,396 356,344 392,312 C410,296 414,280 408,262"
            stroke="#D9A94E" stroke-width="11" opacity="0.24" filter="url(#fTendril)"/>
      <path pathLength="100" d="M330,464 C340,396 356,344 392,312 C410,296 414,280 408,262"
            stroke="#FCEFC8" stroke-width="2.4" opacity="0.7"/>
      <path pathLength="100" d="M352,470 C356,420 366,382 388,356"
            stroke="#E9C36A" stroke-width="6" opacity="0.2" filter="url(#fTendril)"/>
    </g>

    <!-- ============ the thread of light ============ -->
    <g stroke-dasharray="100" stroke-dashoffset="100" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" begin="0s" dur="2.4s" values="100;0" keyTimes="0;1"
               fill="freeze" calcMode="spline" keySplines=".3 .1 .3 1"/>
      <path pathLength="100" d="M390,-12 C381,86 399,182 390,266 C385,312 393,364 390,430"
            stroke="#C9922E" stroke-width="17" opacity="0.20" filter="url(#fSoft)"/>
      <path pathLength="100" d="M390,-12 C381,86 399,182 390,266 C385,312 393,364 390,430"
            stroke="#E9C36A" stroke-width="5.5" opacity="0.62" filter="url(#fThread)"/>
      <path pathLength="100" d="M390,-12 C381,86 399,182 390,266 C385,312 393,364 390,430"
            stroke="#FFFDF4" stroke-width="1.8" opacity="0.95"/>
    </g>

    <!-- ============ tendril wrapping IN FRONT ============ -->
    <g stroke-dasharray="100" stroke-dashoffset="100" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" begin="2.0s" dur="2.2s" values="100;0" keyTimes="0;1"
               fill="freeze" calcMode="spline" keySplines=".25 .1 .25 1"/>
      <path pathLength="100" d="M452,464 C442,398 426,348 388,318 C370,302 368,286 376,268"
            stroke="#D9A94E" stroke-width="11" opacity="0.26" filter="url(#fTendril)"/>
      <path pathLength="100" d="M452,464 C442,398 426,348 388,318 C370,302 368,286 376,268"
            stroke="#FFF8E4" stroke-width="2.6" opacity="0.8"/>
      <path pathLength="100" d="M428,472 C424,424 414,388 394,362"
            stroke="#E9C36A" stroke-width="6" opacity="0.22" filter="url(#fTendril)"/>
    </g>

    <!-- ============ the clasp — the 'urwah ============ -->
    <circle cx="390" cy="318" r="10" fill="url(#bloomG)" opacity="0">
      <animate attributeName="opacity" begin="3.4s" dur="1.6s" values="0;0.85;0" keyTimes="0;0.3;1" fill="freeze"/>
      <animate attributeName="r" begin="3.4s" dur="1.6s" values="10;78" keyTimes="0;1" fill="freeze"/>
    </circle>
    <g opacity="0" transform="translate(390,318)">
      <animate attributeName="opacity" begin="3.3s" dur="1.2s" values="0;1" keyTimes="0;1" fill="freeze"/>
      <g>
        <animateTransform attributeName="transform" type="scale" begin="3.3s" dur="1.2s"
          values="0.4;1.12;1" keyTimes="0;0.7;1" fill="freeze"
          calcMode="spline" keySplines=".2 .8 .3 1;.4 0 .6 1"/>
        <g>
          <animateTransform attributeName="transform" type="scale" begin="4.5s" dur="7s" repeatCount="indefinite"
            values="1;1.05;1" keyTimes="0;0.5;1" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
          <ellipse rx="35" ry="22" transform="rotate(-12)" fill="none" stroke="#C9922E" stroke-width="10" opacity="0.24" filter="url(#fSoft)"/>
          <ellipse rx="35" ry="22" transform="rotate(-12)" fill="none" stroke="#F0D98A" stroke-width="3.2" opacity="0.85" filter="url(#fThread)"/>
          <ellipse rx="35" ry="22" transform="rotate(-12)" fill="none" stroke="#FFFDF4" stroke-width="1.3" opacity="0.9"/>
        </g>
      </g>
    </g>

    <!-- ============ pulses travelling the thread, both ways, forever ============ -->
    <g filter="url(#fPulse)">
      <!-- descending -->
      <circle r="8" fill="url(#pulseG)" opacity="0">
        <animate attributeName="opacity" begin="4.2s" dur="5s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.86;1"/>
        <animateMotion begin="4.2s" dur="5s" repeatCount="indefinite" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines=".4 0 .6 1">
          <mpath href="#threadPath" xlink:href="#threadPath"/>
        </animateMotion>
      </circle>
      <circle r="6" fill="url(#pulseG)" opacity="0">
        <animate attributeName="opacity" begin="6.1s" dur="5s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.86;1"/>
        <animateMotion begin="6.1s" dur="5s" repeatCount="indefinite" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines=".4 0 .6 1">
          <mpath href="#threadPath" xlink:href="#threadPath"/>
        </animateMotion>
      </circle>
      <!-- ascending -->
      <circle r="7" fill="url(#pulseG)" opacity="0">
        <animate attributeName="opacity" begin="5.2s" dur="5.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.86;1"/>
        <animateMotion begin="5.2s" dur="5.6s" repeatCount="indefinite" calcMode="spline" keyPoints="1;0" keyTimes="0;1" keySplines=".4 0 .6 1">
          <mpath href="#threadPath" xlink:href="#threadPath"/>
        </animateMotion>
      </circle>
      <circle r="5.4" fill="url(#pulseG)" opacity="0">
        <animate attributeName="opacity" begin="7.4s" dur="5.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.86;1"/>
        <animateMotion begin="7.4s" dur="5.6s" repeatCount="indefinite" calcMode="spline" keyPoints="1;0" keyTimes="0;1" keySplines=".4 0 .6 1">
          <mpath href="#threadPath" xlink:href="#threadPath"/>
        </animateMotion>
      </circle>
    </g>

    <!-- drifting motes around the aura -->
    <g fill="#F3DFA6">
      <circle cx="318" cy="440" r="2.4" opacity="0">
        <animate attributeName="cy" begin="4s" dur="9s" repeatCount="indefinite" values="470;350" keyTimes="0;1"/>
        <animate attributeName="opacity" begin="4s" dur="9s" repeatCount="indefinite" values="0;0.7;0" keyTimes="0;0.4;1"/>
      </circle>
      <circle cx="466" cy="440" r="2" opacity="0">
        <animate attributeName="cy" begin="6.5s" dur="11s" repeatCount="indefinite" values="478;340" keyTimes="0;1"/>
        <animate attributeName="opacity" begin="6.5s" dur="11s" repeatCount="indefinite" values="0;0.65;0" keyTimes="0;0.4;1"/>
      </circle>
      <circle cx="352" cy="440" r="1.8" opacity="0">
        <animate attributeName="cy" begin="8.2s" dur="10s" repeatCount="indefinite" values="486;362" keyTimes="0;1"/>
        <animate attributeName="opacity" begin="8.2s" dur="10s" repeatCount="indefinite" values="0;0.6;0" keyTimes="0;0.4;1"/>
      </circle>
      <circle cx="440" cy="440" r="1.7" opacity="0">
        <animate attributeName="cy" begin="9.6s" dur="12s" repeatCount="indefinite" values="490;372" keyTimes="0;1"/>
        <animate attributeName="opacity" begin="9.6s" dur="12s" repeatCount="indefinite" values="0;0.55;0" keyTimes="0;0.4;1"/>
      </circle>
    </g>
  </g>

  <g id="text" font-family="Georgia,'Times New Roman',serif" text-anchor="middle">
    <g opacity="0">
      <animate attributeName="opacity" begin="4.6s" dur="3s" values="0;1" keyTimes="0;1" fill="freeze"/>
      <g>
        <animate attributeName="opacity" begin="7.6s" dur="9s" repeatCount="indefinite" values="1;0.88;1" keyTimes="0;0.5;1"/>

        <text x="390" y="508" font-size="27" letter-spacing="0.15em" fill="#FFF6DE" filter="url(#fText)">Al-Urwatul Wuthqa</text>
        <text x="390" y="508" font-size="27" letter-spacing="0.15em" fill="#8A6420">Al-Urwatul Wuthqa</text>

        <g opacity="0.7">
          <line x1="306" y1="530" x2="362" y2="530" stroke="#B08F43" stroke-width="1.1"/>
          <line x1="418" y1="530" x2="474" y2="530" stroke="#B08F43" stroke-width="1.1"/>
          <path d="M390,524 l6,6 l-6,6 l-6,-6 z" fill="#B08F43"/>
        </g>

        <text x="390" y="560" font-size="17" font-style="italic" letter-spacing="0.20em" fill="#7C7458">Secure Trust</text>
      </g>
    </g>
  </g>
</svg>
