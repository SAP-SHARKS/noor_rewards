<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE CULTIVATED LIGHT — Surah al-Baqarah 1–5
  A three-stage loop on one 18s master clock (every animation shares dur="18s" and is placed by
  keyTimes, so the stages can never drift out of sync):

    stage 1  ~0.5–3.5s   seed of light kindles      -> "The Unwavering Truth"   (2:2 la rayba fih)
    stage 2  ~4–8s       roots thread into the dark -> "Belief in the Unseen"   (2:3 al-ghayb)
    stage 3  ~8.5–13s    aura blooms upward         -> "Cultivated Success"     (2:5 al-muflihun)
    ~13–15.5s hold, ~15.5–17.5s dissolve, then reset while invisible.

  Independently of the master clock, the seed and aura keep a slow continuous breath (5s / 7s)
  and motes drift upward, so the piece never feels frozen between stages.

  PIPELINE COMPLIANCE
    1. FIRST gradient is #bg — the intended background, a VERTICAL linearGradient so the
       auto-painted card background meets the artwork edge seamlessly. Decorative gradients follow.
    2. All animation is SMIL inside this file. No external JS and no external CSS of any kind.
    3. All colours are #RRGGBB hex.
    4. 780x585 = exactly 4:3, preserveAspectRatio="xMidYMid meet" set explicitly.

  #illustration : earth, bloom, roots, seed, motes.
  #text         : the three stage labels + caption — removable / translatable.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 585" width="780" height="585"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="A seed of light sends roots into darkness and blooms upward into a warm aura">
  <defs>
    <!-- ===== BACKGROUND GRADIENT — MUST STAY FIRST ===== -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDF8EC"/>
      <stop offset="1" stop-color="#F3E9CF"/>
    </linearGradient>

    <!-- ===== decorative gradients ===== -->
    <linearGradient id="earthG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8C9683" stop-opacity="0"/>
      <stop offset="0.20" stop-color="#6B7563" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#4E5648"/>
      <stop offset="1" stop-color="#3B4238"/>
    </linearGradient>
    <radialGradient id="seedGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFF8E1" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#F2D68C" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#E9C36A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seedMid" cx="42%" cy="38%" r="62%">
      <stop offset="0" stop-color="#FFFBEA"/>
      <stop offset="1" stop-color="#E7BE64"/>
    </radialGradient>
    <radialGradient id="auraG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFF6D8" stop-opacity="0.80"/>
      <stop offset="0.42" stop-color="#F5DE9C" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#EBCB78" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF3C4" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#F3D98C" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#E9C36A" stop-opacity="0.80"/>
    </linearGradient>

    <!-- ===== filters ===== -->
    <filter id="fEarth" x="-20%" y="-40%" width="140%" height="200%"><feGaussianBlur stdDeviation="11"/></filter>
    <filter id="fSoft"  x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fBloom" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="fRoot"  x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fText"  x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="780" height="585" fill="url(#bg)"/>

  <g id="illustration">

    <!-- ============ the darker, muted ground (al-ghayb) ============ -->
    <path filter="url(#fEarth)" fill="url(#earthG)"
          d="M-60,376 C110,354 250,392 390,378 C530,364 668,396 840,372 L840,660 L-60,660 Z"/>

    <!-- ============ STAGE 3 · the bloom ============ -->
    <g id="bloom" opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;0.95;0.95;0;0" keyTimes="0;0.47;0.72;0.86;0.97;1"/>
      <g transform="translate(390,330)">
        <g>
          <animateTransform attributeName="transform" type="scale" dur="18s" repeatCount="indefinite"
            values="0.22;0.22;1;1;1;0.22" keyTimes="0;0.47;0.72;0.86;0.99;1"
            calcMode="spline" keySplines=".4 0 .6 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
          <!-- slow continuous breath, independent of the stage clock -->
          <g>
            <animateTransform attributeName="transform" type="scale" dur="7s" repeatCount="indefinite"
              values="1;1.05;1" keyTimes="0;0.5;1" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>

            <circle r="168" fill="url(#auraG)" filter="url(#fBloom)"/>

            <!-- petals of light -->
            <g filter="url(#fSoft)" fill="url(#petalG)">
              <path transform="rotate(-72)" d="M0,-4 C-15,-50 -11,-112 0,-172 C11,-112 15,-50 0,-4 Z" opacity="0.42"/>
              <path transform="rotate(-48)" d="M0,-4 C-15,-50 -11,-116 0,-182 C11,-116 15,-50 0,-4 Z" opacity="0.52"/>
              <path transform="rotate(-24)" d="M0,-4 C-15,-50 -11,-120 0,-190 C11,-120 15,-50 0,-4 Z" opacity="0.62"/>
              <path                          d="M0,-4 C-16,-52 -12,-124 0,-198 C12,-124 16,-52 0,-4 Z" opacity="0.70"/>
              <path transform="rotate(24)"  d="M0,-4 C-15,-50 -11,-120 0,-190 C11,-120 15,-50 0,-4 Z" opacity="0.62"/>
              <path transform="rotate(48)"  d="M0,-4 C-15,-50 -11,-116 0,-182 C11,-116 15,-50 0,-4 Z" opacity="0.52"/>
              <path transform="rotate(72)"  d="M0,-4 C-15,-50 -11,-112 0,-172 C11,-112 15,-50 0,-4 Z" opacity="0.42"/>
            </g>

            <!-- sage fronds — the cultivated, growing part -->
            <g fill="none" stroke="#93AC8C" stroke-width="2" stroke-linecap="round" opacity="0.55">
              <g transform="rotate(-18)">
                <path d="M0,-8 C-5,-42 -14,-72 -30,-96"/>
                <ellipse cx="-7" cy="-38" rx="8" ry="4" fill="#A5BC9C" stroke="none" transform="rotate(-28 -7 -38)"/>
                <ellipse cx="-15" cy="-62" rx="7" ry="3.6" fill="#9DB595" stroke="none" transform="rotate(-38 -15 -62)"/>
                <ellipse cx="-25" cy="-84" rx="6" ry="3.2" fill="#A5BC9C" stroke="none" transform="rotate(-48 -25 -84)"/>
              </g>
              <g transform="rotate(-48)">
                <path d="M0,-8 C-5,-36 -13,-60 -26,-80"/>
                <ellipse cx="-7" cy="-34" rx="7" ry="3.6" fill="#A5BC9C" stroke="none" transform="rotate(-30 -7 -34)"/>
                <ellipse cx="-16" cy="-56" rx="6" ry="3.2" fill="#9DB595" stroke="none" transform="rotate(-42 -16 -56)"/>
              </g>
              <g transform="scale(-1,1) rotate(-18)">
                <path d="M0,-8 C-5,-42 -14,-72 -30,-96"/>
                <ellipse cx="-7" cy="-38" rx="8" ry="4" fill="#A5BC9C" stroke="none" transform="rotate(-28 -7 -38)"/>
                <ellipse cx="-15" cy="-62" rx="7" ry="3.6" fill="#9DB595" stroke="none" transform="rotate(-38 -15 -62)"/>
                <ellipse cx="-25" cy="-84" rx="6" ry="3.2" fill="#A5BC9C" stroke="none" transform="rotate(-48 -25 -84)"/>
              </g>
              <g transform="scale(-1,1) rotate(-48)">
                <path d="M0,-8 C-5,-36 -13,-60 -26,-80"/>
                <ellipse cx="-7" cy="-34" rx="7" ry="3.6" fill="#A5BC9C" stroke="none" transform="rotate(-30 -7 -34)"/>
                <ellipse cx="-16" cy="-56" rx="6" ry="3.2" fill="#9DB595" stroke="none" transform="rotate(-42 -16 -56)"/>
              </g>
            </g>
          </g>
        </g>
      </g>
    </g>

    <!-- ============ STAGE 2 · roots into the unseen ============ -->
    <g id="roots" opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.22;0.31;0.86;0.97;1"/>
      <g transform="translate(390,330)" stroke-dasharray="100" stroke-dashoffset="100"
         fill="none" stroke-linecap="round">
        <!-- stroke-dashoffset is inherited, so one animation draws every thread in step -->
        <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                 values="100;100;0;0;0;100" keyTimes="0;0.22;0.44;0.86;0.98;1"
                 calcMode="spline" keySplines=".4 0 .6 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
        <!-- soft halo pass -->
        <g stroke="#D6C177" stroke-width="7" opacity="0.28" filter="url(#fRoot)">
          <path pathLength="100" d="M0,14 C-8,52 -26,78 -40,112"/>
          <path pathLength="100" d="M0,14 C6,56 24,84 44,118"/>
          <path pathLength="100" d="M0,14 C-1,60 -4,104 -6,148"/>
          <path pathLength="100" d="M0,14 C-6,44 -22,60 -38,72"/>
          <path pathLength="100" d="M0,14 C5,46 20,62 34,76"/>
          <path pathLength="100" d="M0,14 C-3,70 -16,100 -26,128"/>
          <path pathLength="100" d="M0,14 C3,72 14,102 24,132"/>
        </g>
        <!-- fine thread pass -->
        <g stroke="#F2E7B0" stroke-width="1.7" opacity="0.85">
          <path pathLength="100" d="M0,14 C-8,52 -26,78 -40,112"/>
          <path pathLength="100" d="M0,14 C6,56 24,84 44,118"/>
          <path pathLength="100" d="M0,14 C-1,60 -4,104 -6,148"/>
          <path pathLength="100" d="M0,14 C-6,44 -22,60 -38,72"/>
          <path pathLength="100" d="M0,14 C5,46 20,62 34,76"/>
          <path pathLength="100" d="M0,14 C-3,70 -16,100 -26,128"/>
          <path pathLength="100" d="M0,14 C3,72 14,102 24,132"/>
        </g>
      </g>
      <!-- glowing tips, arriving as the threads settle -->
      <g transform="translate(390,330)" fill="#F7EEC2" opacity="0">
        <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                 values="0;0;0.9;0.9;0;0" keyTimes="0;0.44;0.52;0.86;0.95;1"/>
        <circle cx="-40" cy="112" r="3.2"/><circle cx="44" cy="118" r="3.4"/>
        <circle cx="-6" cy="148" r="3.6"/><circle cx="-38" cy="72" r="2.6"/>
        <circle cx="34" cy="76" r="2.6"/><circle cx="-26" cy="128" r="3"/>
        <circle cx="24" cy="132" r="3"/>
      </g>
    </g>

    <!-- ============ STAGE 1 · the seed ============ -->
    <g id="seed" opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.03;0.14;0.86;0.97;1"/>
      <g transform="translate(390,330)">
        <g>
          <!-- continuous breath, never stops -->
          <animateTransform attributeName="transform" type="scale" dur="5s" repeatCount="indefinite"
            values="1;1.07;1" keyTimes="0;0.5;1" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
          <circle r="58" fill="url(#seedGlow)" filter="url(#fSoft)">
            <animate attributeName="opacity" dur="5s" repeatCount="indefinite" values="0.7;1;0.7" keyTimes="0;0.5;1"/>
          </circle>
          <circle r="21" fill="url(#seedMid)" filter="url(#fRoot)"/>
          <circle r="8.5" fill="#FFFBEA"/>
        </g>
      </g>
    </g>

    <!-- ============ drifting motes ============ -->
    <g fill="#F0DFA4">
      <circle cx="318" cy="300" r="2.6" opacity="0">
        <animate attributeName="cy" dur="9s" repeatCount="indefinite" values="330;180" keyTimes="0;1"/>
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0.75;0" keyTimes="0;0.35;1"/>
      </circle>
      <circle cx="452" cy="300" r="2.2" opacity="0">
        <animate attributeName="cy" dur="11s" begin="-3s" repeatCount="indefinite" values="336;168" keyTimes="0;1"/>
        <animate attributeName="opacity" dur="11s" begin="-3s" repeatCount="indefinite" values="0;0.7;0" keyTimes="0;0.35;1"/>
      </circle>
      <circle cx="390" cy="300" r="2" opacity="0">
        <animate attributeName="cy" dur="10s" begin="-6s" repeatCount="indefinite" values="326;160" keyTimes="0;1"/>
        <animate attributeName="opacity" dur="10s" begin="-6s" repeatCount="indefinite" values="0;0.65;0" keyTimes="0;0.35;1"/>
      </circle>
      <circle cx="486" cy="300" r="1.8" opacity="0">
        <animate attributeName="cy" dur="12s" begin="-8s" repeatCount="indefinite" values="340;200" keyTimes="0;1"/>
        <animate attributeName="opacity" dur="12s" begin="-8s" repeatCount="indefinite" values="0;0.55;0" keyTimes="0;0.35;1"/>
      </circle>
    </g>
  </g>

  <g id="text" font-family="Georgia,'Times New Roman',serif" text-anchor="middle">

    <!-- stage 3 · bright, at the top -->
    <g opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.53;0.64;0.86;0.97;1"/>
      <g>
        <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
          values="0 14;0 14;0 0;0 0;0 14;0 14" keyTimes="0;0.53;0.64;0.86;0.97;1"
          calcMode="spline" keySplines=".4 0 .6 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
        <text x="390" y="112" font-size="29" letter-spacing="0.17em" fill="#F2DEA2" filter="url(#fText)">Cultivated Success</text>
        <text x="390" y="112" font-size="29" letter-spacing="0.17em" fill="#D9AE4C">Cultivated Success</text>
      </g>
    </g>

    <!-- stage 1 · beside the seed -->
    <g opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.08;0.19;0.86;0.97;1"/>
      <g>
        <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
          values="0 10;0 10;0 0;0 0;0 10;0 10" keyTimes="0;0.08;0.19;0.86;0.97;1"
          calcMode="spline" keySplines=".4 0 .6 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
        <text x="390" y="252" font-size="17" font-style="italic" letter-spacing="0.15em" fill="#B08F43">The Unwavering Truth</text>
      </g>
    </g>

    <!-- stage 2 · down in the dark -->
    <g opacity="0">
      <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.31;0.42;0.86;0.97;1"/>
      <g>
        <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
          values="0 10;0 10;0 0;0 0;0 10;0 10" keyTimes="0;0.31;0.42;0.86;0.97;1"
          calcMode="spline" keySplines=".4 0 .6 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
        <text x="390" y="516" font-size="17" font-style="italic" letter-spacing="0.15em" fill="#C9D2C0">Belief in the Unseen</text>
      </g>
    </g>

    <text x="390" y="558" font-size="11" letter-spacing="0.24em" fill="#8E9887" opacity="0.75">AL-BAQARAH 1&#8211;5</text>
  </g>
</svg>
