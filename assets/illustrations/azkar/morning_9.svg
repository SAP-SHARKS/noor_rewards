<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE UNFASTENING KNOTS — al-Baqarah 2:286 (closing supplication)
  "Our Lord, do not lay upon us a burden like that You laid upon those before us...
   Pardon us, forgive us, and have mercy upon us."

  An 18s master-clock loop. Every animation shares the clock and is placed by keyTimes; the reset
  happens during a global dissolve while the scene is invisible (reset window 0.96-1).

     0.0-1.1s    (0-0.06)     three interlocked knots hang stacked in the centre — the burdens;
                              "Within Capacity" appears above
     3.6-7.9s    (0.20-0.44)  a warm veil of light descends gently over them; "Relieve Our
                              Burdens" rises beneath
     as the light reaches each knot (0.26 / 0.32 / 0.38, top to bottom):
        first the two rings PULL APART — the untying, a mechanical separation with a relieved
        ease-out — then each ring's thread RETRACTS ALONG ITS OWN PATH via stroke-dashoffset,
        the two rings unwinding in OPPOSITE directions, drifting apart and dimming only in the
        last stretch of the retraction. The main action is geometric, not an opacity fade.
     10.1-15.1s  (0.56-0.84)  the centre is clear: a soft brightness blooms in the emptied space
                              and "Pardon & Mercy" settles into it
     15.1-16.9s  (0.84-0.94)  global dissolve; knots quietly re-tie during the invisible reset

  RELIEF TIMING: separation uses a spline that leaps early and settles long (.16 .7 .3 1) — the
  knot gives way almost eagerly, then eases — because the feeling asked for is release, not effort.

  PIPELINE COMPLIANCE
    1. FIRST gradient is #bg — the intended background, a VERTICAL linearGradient, muted calm
       cream-to-sage. Decorative gradients follow after it.
    2. All animation is SMIL inside this file. No external JS and no external CSS of any kind.
    3. All paint colours are #RRGGBB hex.
    4. 780x585 = exactly 4:3, preserveAspectRatio="xMidYMid meet" set explicitly.

  #illustration : knots, descending veil, clearing glow.
  #text         : the three phrases — removable / translatable.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 585" width="780" height="585"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Three glowing interlocked knots untying and dissolving as a warm light descends, leaving a clear bright space">
  <defs>
    <!-- ===== BACKGROUND GRADIENT — MUST STAY FIRST ===== -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF5E4"/>
      <stop offset="1" stop-color="#C6CDB2"/>
    </linearGradient>

    <!-- ===== decorative gradients ===== -->
    <linearGradient id="veilG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF4" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#FFF6D8" stop-opacity="0.8"/>
      <stop offset="0.6" stop-color="#FBE7A8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#F2CE7A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="clearG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFBE8" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#FBF0C8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F2DCA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washG" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#FDF6DE" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FDF6DE" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== filters ===== -->
    <filter id="fWide" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="fVeil" x="-30%" y="-70%" width="160%" height="240%"><feGaussianBlur stdDeviation="11"/></filter>
    <filter id="fKnot" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fFine" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="fText" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="780" height="585" fill="url(#bg)"/>

  <!-- ===== master fade: the reset is invisible ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
             values="0;1;1;0;0" keyTimes="0;0.06;0.84;0.94;1"/>

    <g id="illustration">
      <!-- ambient wash -->
      <ellipse cx="390" cy="300" rx="430" ry="330" fill="url(#washG)"/>

      <!-- ============ the clearing: blooms once the last knot is gone ============ -->
      <g transform="translate(390,320)">
        <g opacity="0">
          <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                   values="0;0;1;1;0;0" keyTimes="0;0.54;0.64;0.84;0.94;1"/>
          <g>
            <animateTransform attributeName="transform" type="scale" dur="18s" repeatCount="indefinite"
              values="0.3;0.3;1;1;1;0.3" keyTimes="0;0.54;0.68;0.84;0.99;1"
              calcMode="spline" keySplines=".3 .2 .3 1;.25 .1 .25 1;.4 0 .6 1;.4 0 .6 1;.4 0 .6 1"/>
            <g>
              <animateTransform attributeName="transform" type="scale" dur="7s" repeatCount="indefinite"
                values="1;1.05;1" keyTimes="0;0.5;1" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
              <circle r="215" fill="url(#clearG)" filter="url(#fWide)"/>
              <circle r="92" fill="url(#clearG)" filter="url(#fKnot)"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ============ the three burdens ============ -->
      <!-- ============ knot at y=210, released at t=0.26 ============ -->
      <g transform="translate(390,210)">
        <!-- ring A -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;-15 -9;-25.5 -16.2;-25.5 -16.2;0 0"
            keyTimes="0;0.26;0.31;0.44;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="-22;-22;-35.2;-46.2;-46.2;-22"
              keyTimes="0;0.26;0.31;0.44;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;100;100;0" keyTimes="0;0.26;0.32;0.44;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.39;0.42;0.44;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#5E8C7E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#8FAE96" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
        <!-- ring B -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;15 9;25.5 16.2;25.5 16.2;0 0"
            keyTimes="0;0.26;0.31;0.44;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="22;22;35.2;46.2;46.2;22"
              keyTimes="0;0.26;0.31;0.44;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;-100;-100;0" keyTimes="0;0.26;0.32;0.44;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.39;0.42;0.44;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#C9922E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#E9C36A" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
      </g>
      <!-- ============ knot at y=320, released at t=0.32 ============ -->
      <g transform="translate(390,320)">
        <!-- ring A -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;-15 -9;-25.5 -16.2;-25.5 -16.2;0 0"
            keyTimes="0;0.32;0.37;0.5;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="-22;-22;-35.2;-46.2;-46.2;-22"
              keyTimes="0;0.32;0.37;0.5;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;100;100;0" keyTimes="0;0.32;0.38;0.5;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.45;0.48;0.5;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#C9922E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#E9C36A" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
        <!-- ring B -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;15 9;25.5 16.2;25.5 16.2;0 0"
            keyTimes="0;0.32;0.37;0.5;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="22;22;35.2;46.2;46.2;22"
              keyTimes="0;0.32;0.37;0.5;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;-100;-100;0" keyTimes="0;0.32;0.38;0.5;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.45;0.48;0.5;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#5E8C7E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#8FAE96" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
      </g>
      <!-- ============ knot at y=430, released at t=0.38 ============ -->
      <g transform="translate(390,430)">
        <!-- ring A -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;-15 -9;-25.5 -16.2;-25.5 -16.2;0 0"
            keyTimes="0;0.38;0.43;0.56;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="-22;-22;-35.2;-46.2;-46.2;-22"
              keyTimes="0;0.38;0.43;0.56;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;100;100;0" keyTimes="0;0.38;0.44;0.56;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.51;0.54;0.56;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#5E8C7E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#8FAE96" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
        <!-- ring B -->
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 0;0 0;15 9;25.5 16.2;25.5 16.2;0 0"
            keyTimes="0;0.38;0.43;0.56;0.96;1"
            calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
          <g>
            <animateTransform attributeName="transform" type="rotate" dur="18s" repeatCount="indefinite"
              values="22;22;35.2;46.2;46.2;22"
              keyTimes="0;0.38;0.43;0.56;0.96;1"
              calcMode="spline" keySplines="0 0 1 1;.16 .7 .3 1;.4 .1 .6 .9;0 0 1 1;.4 0 .6 1"/>
            <g stroke-dasharray="100" stroke-dashoffset="0" fill="none" stroke-linecap="round">
              <animate attributeName="stroke-dashoffset" dur="18s" repeatCount="indefinite"
                values="0;0;0;-100;-100;0" keyTimes="0;0.38;0.44;0.56;0.96;1"
                calcMode="spline" keySplines="0 0 1 1;0 0 1 1;.3 .1 .5 1;0 0 1 1;.4 0 .6 1"/>
              <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                values="1;1;1;0;0;1" keyTimes="0;0.51;0.54;0.56;0.96;1"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#C9922E" stroke-width="9" opacity="0.3" filter="url(#fKnot)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#E9C36A" stroke-width="3" opacity="0.9" filter="url(#fFine)"/>
              <path pathLength="100" d="M -44,0 A 44,30 0 1 1 44,0 A 44,30 0 1 1 -44,0"
                    stroke="#FFFDF4" stroke-width="1" opacity="0.75"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ============ the descending veil of light ============ -->
      <rect x="60" y="-190" width="660" height="150" fill="url(#veilG)" filter="url(#fVeil)" opacity="0">
        <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
          values="0 0;0 0;0 700;0 700" keyTimes="0;0.19;0.46;1"
          calcMode="spline" keySplines="0 0 1 1;.3 .15 .55 .9;0 0 1 1"/>
        <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                 values="0;0;0.9;0.85;0;0" keyTimes="0;0.19;0.24;0.42;0.48;1"/>
      </rect>
    </g>

    <g id="text" font-family="Georgia,'Times New Roman',serif" text-anchor="middle">

      <!-- stage 1 · above the burdens -->
      <g opacity="0">
        <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                 values="0;0;1;1;0;0" keyTimes="0;0.06;0.15;0.78;0.88;1"/>
        <text x="390" y="88" font-size="23" letter-spacing="0.22em" fill="#FFF6DE" filter="url(#fText)">Within Capacity</text>
        <text x="390" y="88" font-size="23" letter-spacing="0.22em" fill="#8A6E33">Within Capacity</text>
      </g>

      <!-- stage 2 · beneath, as the light works -->
      <g opacity="0">
        <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                 values="0;0;1;1;0;0" keyTimes="0;0.24;0.33;0.78;0.88;1"/>
        <text x="390" y="540" font-size="17" font-style="italic" letter-spacing="0.18em" fill="#7C7458">Relieve Our Burdens</text>
      </g>

      <!-- stage 3 · in the cleared space -->
      <g opacity="0">
        <animate attributeName="opacity" dur="18s" repeatCount="indefinite"
                 values="0;0;1;1;0;0" keyTimes="0;0.60;0.70;0.84;0.94;1"/>
        <g>
          <animateTransform attributeName="transform" type="translate" dur="18s" repeatCount="indefinite"
            values="0 10;0 10;0 0;0 0;0 10" keyTimes="0;0.60;0.70;0.94;1"
            calcMode="spline" keySplines="0 0 1 1;.25 .1 .25 1;0 0 1 1;.4 0 .6 1"/>
          <text x="390" y="314" font-size="24" letter-spacing="0.20em" fill="#8A6420">Pardon &amp; Mercy</text>
          <text x="390" y="344" font-size="14" font-style="italic" letter-spacing="0.15em" fill="#A8823C">wa&#8216;fu &#8216;anna &#8212; and pardon us</text>
        </g>
      </g>
    </g>
  </g>
</svg>
