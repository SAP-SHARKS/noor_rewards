<?xml version="1.0" encoding="UTF-8"?>
<!--
  Rain of patience · du'a 2:250 (Rabbana afrigh 'alayna sabran…)
  - Animations self-start (CSS inside, looping). No JS or external assets.
  - #illustration : the art (rain, figure standing firm, ground, dawn glow).
  - #text : the embedded translation line(s) — remove or translate freely; uses serif fallback.
  - Scales to any size via viewBox.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 400" width="430" height="400" overflow="visible" role="img" aria-label="Rain of patience falling on a figure standing firm">
  <defs>
    <radialGradient id="sky" cx="50%" cy="22%" r="85%"><stop offset="0" stop-color="#FDF7E2"/><stop offset="1" stop-color="#FBEEC4"/></radialGradient>
    <radialGradient id="dawn" cx="50%" cy="100%" r="70%"><stop offset="0" stop-color="#FCE8A8" stop-opacity=".9"/><stop offset="1" stop-color="#FCE8A8" stop-opacity="0"/></radialGradient>
    <radialGradient id="feet" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#F5E037" stop-opacity=".8"/><stop offset="1" stop-color="#F5E037" stop-opacity="0"/></radialGradient>
    <style>
      .rain{animation:fall 1.7s linear infinite;stroke-width:2;stroke-linecap:round;}
      .rg{stroke:#E9B84A;} .rt{stroke:#2C8C7C;}
      .htext{animation:fin 1.4s ease .3s both;}
      .glowfeet{animation:pulse 3s ease infinite;}
      .dawnP{animation:pulse 4s ease infinite;}
      @keyframes fall{0%{opacity:0;transform:translateY(-20px);}15%{opacity:.7;}85%{opacity:.7;}100%{opacity:0;transform:translateY(165px);}}
      @keyframes fin{from{opacity:0;}to{opacity:1;}}
      @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:.9;}}
      @media (prefers-reduced-motion:reduce){.rain,.htext,.glowfeet,.dawnP{animation:none;}}
    </style>
  </defs>

  <rect x="-200" y="0" width="830" height="400" fill="url(#sky)"/>

  <g id="illustration">
    <rect class="dawnP" x="-200" y="250" width="830" height="150" fill="url(#dawn)" opacity="0.6"/>

    <!-- clouds + light break -->
    <g fill="#E6DFCD">
      <ellipse cx="120" cy="58" rx="58" ry="22"/><ellipse cx="170" cy="48" rx="44" ry="20"/>
      <ellipse cx="310" cy="56" rx="60" ry="22"/><ellipse cx="260" cy="48" rx="40" ry="18"/>
    </g>
    <ellipse cx="215" cy="52" rx="34" ry="16" fill="#FDF7E2"/>

    <!-- rain of patience -->
    <g>
      <line class="rain rg" x1="60"  y1="78" x2="60"  y2="95" style="animation-delay:0s"/>
      <line class="rain rt" x1="86"  y1="78" x2="86"  y2="95" style="animation-delay:.6s"/>
      <line class="rain rg" x1="112" y1="78" x2="112" y2="95" style="animation-delay:1.1s"/>
      <line class="rain rg" x1="138" y1="78" x2="138" y2="95" style="animation-delay:.3s"/>
      <line class="rain rt" x1="164" y1="78" x2="164" y2="95" style="animation-delay:.9s"/>
      <line class="rain rg" x1="190" y1="78" x2="190" y2="95" style="animation-delay:1.4s"/>
      <line class="rain rg" x1="216" y1="78" x2="216" y2="95" style="animation-delay:.2s"/>
      <line class="rain rt" x1="242" y1="78" x2="242" y2="95" style="animation-delay:.8s"/>
      <line class="rain rg" x1="268" y1="78" x2="268" y2="95" style="animation-delay:1.2s"/>
      <line class="rain rg" x1="294" y1="78" x2="294" y2="95" style="animation-delay:.5s"/>
      <line class="rain rt" x1="320" y1="78" x2="320" y2="95" style="animation-delay:1s"/>
      <line class="rain rg" x1="346" y1="78" x2="346" y2="95" style="animation-delay:.4s"/>
      <line class="rain rg" x1="372" y1="78" x2="372" y2="95" style="animation-delay:1.3s"/>
    </g>

    <!-- ground (shorter basement so the figure shows full-length down to feet) -->
    <rect x="-200" y="350" width="830" height="50" fill="#D9CFB7"/>
    <line x1="0" y1="350" x2="430" y2="350" stroke="#C7BC9E" stroke-width="2"/>

    <!-- figure in long Juba — extends from shoulders to the new ground line -->
    <circle class="glowfeet" cx="215" cy="350" r="34" fill="url(#feet)" opacity="0"/>
    <g fill="#4a4a44">
      <circle cx="215" cy="222" r="14"/>
      <!-- long Juba: shoulders at y=244, widens slightly toward hem at y=350 -->
      <path d="M180 350 Q182 290 188 244 Q215 238 242 244 Q248 290 250 350 Z"/>
    </g>
    <!-- subtle hem highlight on the Juba -->
    <path d="M180 348 Q215 354 250 348" stroke="#2e2e28" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <g id="text">
    <g class="htext">
      <rect x="24" y="128" width="382" height="34" rx="10" fill="#FDF7E2" opacity="0.55"/>
      <text x="215" y="151" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="600" font-size="15" fill="#9c7d1e">Shower us with perseverance &amp; make our steps firm</text>
    </g>
  </g>
</svg>
