<svg class="coin" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="o1Gold" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFE89A"/>
      <stop offset="55%" stop-color="#E8B84A"/>
      <stop offset="100%" stop-color="#8B6420"/>
    </radialGradient>
    <radialGradient id="o1Emerald" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7FCFA8"/>
      <stop offset="50%" stop-color="#4A9B8E"/>
      <stop offset="100%" stop-color="#1F4F3D"/>
    </radialGradient>
    <linearGradient id="o1SGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFFAEC"/>
      <stop offset="50%" stop-color="#FFD662"/>
      <stop offset="100%" stop-color="#A37520"/>
    </linearGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="90" cy="90" r="86" fill="url(#o1Gold)" stroke="#5C3A0A" stroke-width="2.5"/>
  <!-- Decorative dots on the ring -->
  <g fill="#5C3A0A" opacity="0.5">
    <circle cx="90" cy="14" r="1.8"/><circle cx="125" cy="22" r="1.8"/>
    <circle cx="154" cy="48" r="1.8"/><circle cx="166" cy="85" r="1.8"/>
    <circle cx="158" cy="125" r="1.8"/><circle cx="130" cy="155" r="1.8"/>
    <circle cx="90" cy="166" r="1.8"/><circle cx="50" cy="155" r="1.8"/>
    <circle cx="22" cy="125" r="1.8"/><circle cx="14" cy="85" r="1.8"/>
    <circle cx="26" cy="48" r="1.8"/><circle cx="55" cy="22" r="1.8"/>
  </g>
  <!-- Gold highlight on ring -->
  <ellipse cx="60" cy="55" rx="22" ry="12" fill="#FFFAEC" opacity="0.5"/>
  <!-- Emerald center -->
  <circle cx="90" cy="90" r="62" fill="url(#o1Emerald)" stroke="#1F4F3D" stroke-width="1.5"/>
  <!-- Emerald highlight -->
  <ellipse cx="72" cy="72" rx="20" ry="11" fill="#A8E0C5" opacity="0.5"/>
  <circle cx="115" cy="115" r="2.5" fill="#FFFAEC" opacity="0.6"/>
  <!-- Bold italic serif S -->
  <text x="90" y="125" font-family="Fraunces, serif" font-size="100" font-weight="800" 
        fill="url(#o1SGold)" text-anchor="middle" style="font-style: italic;"
        stroke="#5C3A0A" stroke-width="1.2">S</text>
  <!-- Highlight on the S -->
  <text x="90" y="125" font-family="Fraunces, serif" font-size="100" font-weight="800" 
        fill="#FFFAEC" text-anchor="middle" style="font-style: italic;" opacity="0.25">S</text>
</svg>