name: noor_rewards
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+10

environment:
  sdk: '>=3.7.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  lottie: ^3.3.2
  device_preview: ^1.3.1
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.12.0
  flutter_svg: ^2.2.3
  http: ^1.6.0
  just_audio: ^0.10.5
  hive_flutter: ^1.1.0
  # Google Play In-App Updates — checks Play for a newer build on launch
  # and prompts the user inside the app (flexible) or blocks them with a
  # mandatory full-screen dialog (immediate) based on the priority that
  # was set on the Play Console release.
  in_app_update: ^4.2.3
  audio_session: ^0.2.2
  provider: ^6.1.5+1
  flex_color_picker: ^3.8.0
  device_info_plus: ^12.3.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  uuid: ^4.5.3
  image_picker: ^1.1.2
  confetti: ^0.8.0
  flutter_local_notifications: ^21.0.0
  flutter_dotenv: ^6.0.0          # load .env credentials at runtime
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_timezone: ^5.0.2
  video_player: ^2.9.2
  chewie: ^1.8.5
  image_cropper: ^8.0.2

  hive: any
  path_provider: 2.1.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  crypto: ^3.0.7
  cached_network_image: ^3.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


  supabase: any
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  image: ^4.8.0
  jni: any
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/data/
    - assets/icons/
    - .env                         # Quran Foundation API credentials
  fonts:
    - family: AlQalamQuran
      fonts:
        - asset: assets/fonts/Al_Qalam_Quran_Majeed_2.ttf